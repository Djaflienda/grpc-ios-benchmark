syntax = "proto3";
package product;
option swift_prefix = "PB";

message Specification {
    string key = 1;
    string value = 2;
    string unit = 3;
}

message Product {
    string id = 1;
    string name = 2;
    string description = 3;
    double price = 4;
    string currency = 5;
    string category = 6;
    repeated string image_urls = 7;
    repeated Specification specs = 8;
    map<string, string> attributes = 9;
    int64 stock_count = 10;
    double rating = 11;
    int32 review_count = 12;
    bool is_available = 13;
    string seller_id = 14;
    string created_at = 15;
}

message ProductRequest {
    int32 limit = 1;
    string category_filter = 2;
}

message ProductList {
    repeated Product products = 1;
    int32 total = 2;
    int64 timestamp = 3;
}

service ProductService {
    rpc GetProducts(ProductRequest) returns (ProductList);
}
